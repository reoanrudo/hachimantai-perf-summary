name: AI Dashboard Update

# Issue が作成されたら AI が dashboard.html を自動編集
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  ai-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI で dashboard.html を編集
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # dashboard.html が存在しない場合はスキップ
          if [ ! -f "dashboard.html" ]; then
            echo "dashboard.html が見つかりません。スキップします。"
            exit 0
          fi

          # 現在の dashboard.html を読み込む
          CURRENT_HTML=$(cat dashboard.html)

          # AI に送るプロンプト（Anthropic Messages API 形式）
          PAYLOAD=$(jq -n \
            --arg model "glm-4.7" \
            --arghtml current "$CURRENT_HTML" \
            --arg instruction "$ISSUE_TITLE" \
            --arg detail "$ISSUE_BODY" \
            '{
              model: $model,
              max_tokens: 16000,
              system: "あなたはWebダッシュボードの編集アシスタントです。ユーザーの指示に従ってHTMLを編集し、編集後の完全なHTMLのみを返してください。説明文やマークダウンは含めず、<html>から</html>までの完全なHTMLコードのみを出力してください。CSSクラスや既存のデザインシステムを維持してください。",
              messages: [
                {
                  role: "user",
                  content: "以下のHTMLダッシュボードがあります。\n\nユーザー指示: \(" + $instruction + ")\n\n詳細: \($detail)\n\n現在のHTML:\n\n" + $current + "\n\nこの指示に従ってHTMLを編集し、完全なHTMLコードのみを返してください。"
                }
              ]
            }')

          # Z.AI Anthropic 互換 API を呼び出し
          RESPONSE=$(curl -s -X POST "https://api.z.ai/api/anthropic/v1/messages" \
            -H "x-api-key: $ZAI_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # レスポンスから HTML を抽出
          NEW_HTML=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')

          if [ -z "$NEW_HTML" ] || [ "$NEW_HTML" = "null" ]; then
            echo "❌ AI応答が空です。レスポンス:"
            echo "$RESPONSE" | head -20
            exit 1
          fi

          # HTMLタグが含まれているか確認
          if ! echo "$NEW_HTML" | grep -q "<html"; then
            echo "❌ AI応答にHTMLが含まれていません:"
            echo "$NEW_HTML" | head -5
            exit 1
          fi

          # ```html ... ``` のフェンスがあれば取り出す
          if echo "$NEW_HTML" | grep -q '```html'; then
            NEW_HTML=$(echo "$NEW_HTML" | sed -n '/```html/,/```/p' | sed '1d;$d')
          fi

          # 新しいHTMLを保存
          echo "$NEW_HTML" > dashboard.html
          echo "✅ dashboard.html を更新しました"

      - name: 変更をコミット
        run: |
          git config user.name "AI Dashboard Bot"
          git config user.email "actions@github.com"

          if git diff --quiet dashboard.html; then
            echo "変更なし"
          else
            git add dashboard.html
            git commit -m "🤖 AI更新: ${{ github.event.issue.title }}"
            git push
            echo "✅ コミット完了"
          fi

      - name: Issue にコメント
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const message = '${{ job.status }}' === 'success'
              ? 'ダッシュボードを更新しました。数秒後に https://reoanrudo.github.io/hachimantai-perf-summary/dashboard.html に反映されます。'
              : 'ダッシュボードの更新に失敗しました。GitHub Actionsのログを確認してください。';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `${status} ${message}`
            });

      - name: Issue を閉じる
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
