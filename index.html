<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パフォーマンス最適化まとめ（S+プロジェクト）</title>
<style>
:root{--primary:#116384;--primary-dark:#0d4d66;--night:#0a1f23;--night2:#143235;--surface:#fbf9f8;--on-surface:#1b1c1c;--outline:#c0c7ce;--accent:#d89b1d;--green:#16a34a;--green-light:#4ade80;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--amber:#d97706;--amber-bg:#fffbeb;--blue:#2563eb;--blue-bg:#eff6ff;--purple:#9333ea;--purple-bg:#faf5ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;background:var(--surface);color:var(--on-surface);line-height:1.8;padding:2rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:860px;margin:0 auto}
a{color:var(--blue)}
.hero{background:linear-gradient(135deg,var(--night),var(--night2) 35%,var(--primary-dark) 70%,var(--primary));border-radius:20px;padding:40px 36px 32px;margin-bottom:28px;color:#fff;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(10,31,35,.4)}
.hero::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(216,155,29,.15),transparent 70%);border-radius:50%}
.hero-kicker{font-size:.72em;font-weight:700;letter-spacing:.2em;opacity:.6;margin-bottom:6px;position:relative}
.hero-title{font-size:1.85em;font-weight:900;margin-bottom:14px;position:relative}
.hero-meta{font-size:.82em;opacity:.75;position:relative}
.hero-meta code{background:rgba(255,255,255,.12);padding:2px 8px;border-radius:4px}
.hero-stats{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;position:relative}
.stat-card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 22px;min-width:130px}
.stat-label{font-size:.68em;opacity:.6;letter-spacing:.12em}
.stat-value{font-size:1.9em;font-weight:900}
.green{color:var(--green-light)}
.banner-success{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:14px;padding:18px 24px;margin-bottom:28px;font-size:.95em;color:#14532d}
h2{font-size:1.35em;font-weight:800;color:var(--primary);margin:36px 0 16px;padding-bottom:10px;border-bottom:3px solid var(--primary)}
.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.06);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.9em;min-width:520px}
thead tr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
th{padding:14px 16px;text-align:left;font-weight:700}
td{padding:11px 16px;border-bottom:1px solid #e2e8f0;text-align:center}
tbody tr:nth-child(odd){background:#fff}
tbody tr:nth-child(even){background:#f8fafc}
.score-good{color:var(--green);font-weight:700}
.score-good-big{color:var(--green);font-weight:800;font-size:1.2em}
.score-warn{color:var(--amber);font-weight:700}
.score-bad{color:var(--red)}
.badge-green{background:#dcfce7;color:var(--green);padding:3px 10px;border-radius:20px;font-weight:700;font-size:.85em}
.badge-warn{background:#fef9c3;color:var(--amber);padding:3px 10px;border-radius:20px;font-size:.85em}
.badge-gray{background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:20px;font-size:.85em}
.info-box{background:var(--blue-bg);border-left:4px solid var(--blue);border-radius:8px;padding:12px 18px;margin-bottom:28px;font-size:.85em;color:#1e40af}
.task-card{background:#fff;border:1px solid #e2e8f0;border-left:5px solid var(--primary);border-radius:12px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.task-card-muted{background:#fff;border:1px solid #e2e8f0;border-left:5px solid #64748b;border-radius:12px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.task-card-best{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid var(--accent);border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:0 8px 24px rgba(245,158,11,.15)}
.task-number,.task-number-muted{color:#fff;min-width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.9em;margin-right:8px;vertical-align:middle}
.task-number{background:var(--primary)}
.task-number-muted{background:#64748b}
.task-title{font-size:1em;font-weight:700;color:#0f172a;margin-bottom:5px}
.task-title-best{font-size:1.1em;font-weight:800;color:#78350f;margin-bottom:6px}
.task-body{font-size:.83em;color:#475569;line-height:1.65}
.task-body code{background:#f1f5f9;padding:1px 4px;border-radius:3px}
.task-effect{background:var(--green-bg);border-radius:6px;padding:6px 12px;margin-top:8px;font-size:.8em;color:#166534}
.task-learn{background:var(--blue-bg);border-radius:6px;padding:6px 12px;margin-top:8px;font-size:.8em;color:#1e40af}
.commit{font-family:monospace;font-size:.72em;background:#f1f5f9;padding:2px 7px;border-radius:4px;color:#64748b}
.task-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tag-best{background:#fff;border:1px solid var(--accent);border-radius:20px;padding:4px 14px;font-size:.8em;font-weight:700;color:#b45309}
.tag-best-outline{background:#fff;border:1px solid var(--accent);border-radius:20px;padding:4px 14px;font-size:.8em;color:#92400e}
.task-row{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.task-card-small{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;flex:1;min-width:280px;box-shadow:0 2px 8px rgba(0,0,0,.04);font-size:.8em;color:#475569}
.warning-box{background:linear-gradient(135deg,#fef2f2,#fee2e2);border:2px solid var(--red);border-radius:14px;padding:18px 22px;margin-bottom:28px;color:#b91c1c;font-size:.82em;line-height:1.65}
.warning-box code{background:#fff;padding:1px 4px;border-radius:3px}
.chart{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;padding:24px;margin-bottom:28px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.chart-bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:160px;padding:0 8px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.bar-label{font-size:.65em;color:#94a3b8;text-align:center}
.bar{width:100%;max-width:56px;border-radius:6px 6px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:6px;color:#fff;font-weight:800;font-size:.9em}
.bar-gray{background:linear-gradient(180deg,#64748b,#475569)}
.bar-red{background:linear-gradient(180deg,#ef4444,#dc2626)}
.bar-amber{background:linear-gradient(180deg,#f59e0b,#d97706)}
.bar-green{background:linear-gradient(180deg,#16a34a,#15803d)}
.bar-green-glow{background:linear-gradient(180deg,#22c55e,#16a34a);box-shadow:0 0 16px rgba(34,197,94,.4)}
.insight-grid{display:grid;gap:12px;margin-bottom:28px}
.insight{border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;font-size:.82em;color:#475569;line-height:1.6}
.insight strong{display:block;margin-bottom:4px}
.insight-blue{background:linear-gradient(135deg,#fff,var(--blue-bg))}.insight-blue strong{color:#1e3a8a}
.insight-amber{background:linear-gradient(135deg,#fff,#fefce8)}.insight-amber strong{color:#854d0e}
.insight-red{background:linear-gradient(135deg,#fff,var(--red-bg))}.insight-red strong{color:#991b1b}
.insight-green{background:linear-gradient(135deg,#fff,var(--green-bg))}.insight-green strong{color:#14532d}
.insight-purple{background:linear-gradient(135deg,#fff,var(--purple-bg))}.insight-purple strong{color:#6b21a8}
.insight-number{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9em;color:#fff;flex-shrink:0}
.insight-number-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);box-shadow:0 4px 8px rgba(59,130,246,.3)}
.insight-number-amber{background:linear-gradient(135deg,#eab308,#ca8a04);box-shadow:0 4px 8px rgba(234,179,8,.3)}
.insight-number-red{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 4px 8px rgba(239,68,68,.3)}
.insight-number-green{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 8px rgba(34,197,94,.3)}
.insight-number-purple{background:linear-gradient(135deg,#a855f7,#9333ea);box-shadow:0 4px 8px rgba(168,85,247,.3)}
.future-grid{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.future-card{border:2px solid;border-radius:14px;padding:18px;flex:1;min-width:200px;text-align:center}
.future-amber{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fcd34d}
.future-green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
.future-blue{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#93c5fd}
.future-icon{font-size:2em;margin-bottom:6px}
.future-score{font-size:1.6em;font-weight:900;margin-top:4px}
.future-amber .future-score{color:var(--amber)}.future-green .future-score{color:var(--green)}.future-blue .future-score{color:var(--blue)}
.future-note{font-size:.72em;color:#64748b;margin-top:4px}
.cta-box{background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:14px;padding:20px 24px;margin-bottom:28px;color:#fff;text-align:center;box-shadow:0 8px 24px rgba(17,99,132,.25)}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.footer-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;font-size:.8em;color:#475569}
.footer-label,.footer-label-amber,.footer-label-green{font-size:.72em;font-weight:700;letter-spacing:.1em;margin-bottom:6px}
.footer-label{color:var(--primary)}.footer-label-amber{color:var(--amber)}.footer-label-green{color:var(--green)}
.footer-card code{background:#f1f5f9;padding:1px 5px;border-radius:3px;font-size:.92em}
@media(max-width:640px){.hero{padding:28px 20px}.hero-title{font-size:1.4em}.stat-card{min-width:100px;padding:10px 16px}.stat-value{font-size:1.5em}.chart-bars{height:120px;gap:4px}.bar{font-size:.75em}.task-row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
<div id="content">Loading...</div>
</div>
<script>
// content/summary.txt を取得してレンダリング
fetch('content/summary.txt')
  .then(function(r){ return r.text() })
  .then(function(markdown){
    // YAML frontmatter を分離
    var fmMatch = markdown.match(/^---\n[\s\S]*?\n---\n([\s\S]*)$/);
    var body = fmMatch ? fmMatch[1] : markdown;

    // 簡易Markdown→HTML変換
    var html = body;
    // 見出し
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // 強調
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // インラインコード
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // ブロック分割（HTMLブロックは保持、それ以外は段落化）
    var blocks = html.split(/\n\n+/);
    html = blocks.map(function(b){
      if (b.match(/^<(div|table|h[1-6]|hr|ul|ol)/)) return b;
      if (b.match(/^</)) return b;
      return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    document.getElementById('content').innerHTML = html;
  })
  .catch(function(err){
    document.getElementById('content').innerHTML = '<p>Error: ' + err.message + '</p>';
  });
</script>
</body>
</html>
